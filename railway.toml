[build]
builder = "nixpacks"

[deploy]
startCommand = "python railway_deploy.py && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "web"

[services.variables]
PORT = "5000"

# Add persistent volume for logs
[[services.volumes]]
name = "logs"
mountPath = "/app/logs"
