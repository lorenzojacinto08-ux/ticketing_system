<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket • JDMT Ticketing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="app-shell">
        {% include 'header.html' %}

        <div class="layout">
            {% include 'sidebar.html' %}

            <main class="content">
                <div class="content-header">
                    <h1>Edit Ticket</h1>
                    <p class="subtitle">Update ticket details</p>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form method="post" action="{{ url_for('edit_ticket', ticket_id=ticket_id) }}" onsubmit="return confirm('Are you sure you want to save these changes?');">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label">Store Name</label>
                                    <input type="text" class="form-control" id="name" name="name" value="{{ store_name }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="contact_number" class="form-label">Contact Number (optional)</label>
                                    <input type="tel" class="form-control" id="contact_number" name="contact_number" value="{{ contact_number }}">
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email (optional)</label>
                                    <input type="email" class="form-control" id="email" name="email" value="{{ email }}">
                                </div>
                                <div class="col-md-6">
                                    <label for="subject" class="form-label">Subject</label>
                                    <input type="text" class="form-control" id="subject" name="subject" value="{{ subject }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="job_order" class="form-label">JO (optional)</label>
                                    <input type="text" class="form-control" id="job_order" name="job_order" value="{{ job_order }}">
                                </div>
                                <div class="col-md-6">
                                    <label for="assigned_to" class="form-label">Assigned To</label>
                                    <select class="form-select" id="assigned_to" name="assigned_to">
                                        <option value="">Select assignee</option>
                                        <option value="IT Support" {% if assigned_to == 'IT Support' %}selected{% endif %}>IT Support</option>
                                        <option value="Technician 1" {% if assigned_to == 'Technician 1' %}selected{% endif %}>Technician 1</option>
                                        <option value="Technician 2" {% if assigned_to == 'Technician 2' %}selected{% endif %}>Technician 2</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="reported_concern" class="form-label">Reported Concern</label>
                                    <textarea class="form-control" id="reported_concern" name="reported_concern" rows="4" required>{{ reported_concern }}</textarea>
                                </div>
                                <div class="col-md-4">
                                    <label for="status" class="form-label">Status</label>
                                    <select class="form-select" id="status" name="status">
                                        <option value="pending" {% if status == 'pending' %}selected{% endif %}>Pending</option>
                                        <option value="ongoing" {% if status == 'ongoing' %}selected{% endif %}>Ongoing</option>
                                        <option value="completed" {% if status == 'completed' %}selected{% endif %}>Completed</option>
                                    </select>
                                </div>
                                <div class="col-12 d-flex justify-content-end pt-2">
                                    <button type="submit" class="primary-button">Save Changes</button>
                                    <a href="{{ url_for('home', _anchor='tickets') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
